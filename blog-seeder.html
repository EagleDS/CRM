const POSTS = {"post_01_the_boy_who_never_smiled":{"title":"The Boy Who Never Smiled","body":"<p>They called me the boy who never smiled.</p>\n<p>I was nine years old at Ilam School. I wasn't sad. I was carrying my family and I had been for as long as I could remember \u2014 every move, every new school, every set of streets none of us knew yet. Six moves before I was thirteen. I was always the one who figured it out first. Took the weight before they felt it. Absorbed what was coming so they didn't have to.</p>\n<p>Nobody asked me to. It was just who I was.</p>\n\n<div class=\"section-break\">\u2014 \u2014 \u2014</div>\n\n<p>We were living in \u014cr\u0101kei when my brother got hospitalised. I was away at camp. M\u0101ori kids beating another M\u0101ori kid for being too fair-skinned, for wearing a private school blazer through the wrong streets.</p>\n<p>I came home to that.</p>\n<p>A few weeks later ten of them showed up at the house. My mum stepped outside and told the leader he could fight me one on one right there in the street.</p>\n<p>He wasn't expecting that. He backed down.</p>\n<p>I was already training by then. But that's not why he backed down. He backed down because my mother didn't flinch. She understood the only language that meant anything in that street and she spoke it without hesitation.</p>\n<p>I was the one who would walk forward. I'd always been the one who walked forward.</p>\n\n<div class=\"section-break\">\u2014 \u2014 \u2014</div>\n\n<p>I grew up Ng\u0101i Tahu in a body that didn't look it. Shamed for claiming the identity by the people it belonged to. Dismissed for it inside my own family. I wore a private school uniform through a neighbourhood that treated it as a target. I finished primary school alone \u2014 my siblings had gone to Auckland, then my mum, and I stayed to finish in one place for once.</p>\n<p>The boy who never smiled wasn't sad.</p>\n<p>He was working.</p>\n\n<div class=\"section-break\">\u2014 \u2014 \u2014</div>\n\n<p>I went on to compete for New Zealand across four combat disciplines. Four Olympic campaigns. Fifteen consecutive national titles. World championships on five continents. I built Eagle DS from a garage into a full facility \u2014 900 matches, zero concussions, fifty clubs, a clinical arm running alongside the competition pathway.</p>\n<p>None of that is the achievement.</p>\n<p>The achievement is that every piece of it was built in service of something larger than myself. That was the pattern from the beginning. Carry the weight, walk forward, make it possible for others. It just kept scaling.</p>\n<p>The sport. The national scene. The next generation of competitors. The young people in East T\u0101maki who are right now carrying more than they should, in environments that have already decided what they are.</p>\n<p>That place is what I built.</p>\n<p>Not because I figured something out.</p>\n<p>Because I was the boy who never smiled, and I knew exactly what he needed, and I made sure it existed.</p>\n","excerpt":"They called me the boy who never smiled.\u2026","category":"Story","sector":"all","status":"draft","postNumber":1,"updatedAt":"2026-06-03T02:22:31.953299","created":"2026-06-03T02:22:31.953429"},"post_02_port_moresby":{"title":"Port Moresby","body":"<p>Port Moresby, March 2016. A sports hall in Papua New Guinea. No air conditioning. Brutal heat. The weight of the chest guard. The squeak and give of the mats under my feet.</p>\n<p>One fight. One Olympic spot. Twelve years of everything I had.</p>\n<p>The electronic scoring system had been upgraded that day. Neither of us could land a registered point. We went to golden point \u2014 next score wins, Olympics or nothing.</p>\n<p>He threw a kick. I threw a punch. Both landed.</p>\n<p>His registered first.</p>\n\n<div class=\"section-break\">\u2014 \u2014 \u2014</div>\n\n<p>When it ended I felt like I was nothing. That I meant nothing. That I had done nothing with my life. That every sacrifice I had ever made \u2014 every early morning, every injury trained through, every year given entirely to one thing \u2014 I had killed all of it. Made it worthless.</p>\n<p>I felt I had let down everyone who ever supported me. My family. My training partners. My coaches. Every young person who had watched me and wanted what I was chasing, who saw their own dream in mine. I felt I had killed their dreams too. That my purpose would have been better served if I had never started. That everything I did from that point forward would lead the same direction.</p>\n<p>So why try. Ever again.</p>\n<p>I don't know how I survived what came next. I mean that plainly. Not as a way of saying it was hard. As a true statement about something I still don't fully understand.</p>\n\n<div class=\"section-break\">\u2014 \u2014 \u2014</div>\n\n<p>Years later Dan Hooker lost to Michael Chandler and felt like his career was over.</p>\n<p>I knew exactly where he was. Not a version of it. The same place. The same collapse. The same question \u2014 why would I try ever again.</p>\n<p>Because I had been there I could reach him. Not with a framework. Not with perspective or positivity or a plan. Just the specific knowledge of someone who had been to that place and come back. Who could sit across from him and say \u2014 I know what this is. I know what it feels like to believe it's all been for nothing. And I know what's on the other side of it.</p>\n<p>He went on to beat Jalin Turner at UFC 290. Won with a broken arm.</p>\n<p>That result didn't come from technique. It came from what we built in the space between Chandler and Turner \u2014 in the work of returning to the question of what's still there when everything else has been taken.</p>\n\n<div class=\"section-break\">\u2014 \u2014 \u2014</div>\n\n<p>That is the only qualification that matters in this work.</p>\n<p>Not the medals. Not the titles. Not the methodology.</p>\n<p>The fact that I have been to the place where meaning collapses completely and came back. And because of that I can reach someone else who is there \u2014 a world class fighter, a young person in East T\u0101maki, anyone who is sitting in the wreckage of something they gave everything to.</p>\n<p>I know what's underneath it.</p>\n<p>There is always something underneath it.</p>\n<p>My job is to help them find it before they stop looking.</p>\n","excerpt":"Port Moresby, March 2016. A sports hall in Papua New Guinea. No air conditioning. Brutal heat. The weight of the chest guard. The squeak and give of the mats under my feet.\u2026","category":"Story","sector":"all","status":"draft","postNumber":2,"updatedAt":"2026-06-03T02:22:31.957671","created":"2026-06-03T02:22:31.957679"},"post_03_athens":{"title":"Athens","body":"<p>I was 19 years old at the Athens qualifying tournament in Thailand.</p>\n<p>I fought the gold medallist. Broke his jaw. Broke his arm. Should have been a KO but the federation running the tournament was doing everything they could to carry him \u2014 I was from the union, he was theirs, and the result reflected that. I got silver.</p>\n<p>Didn't matter. The selectors saw what happened. They selected me as New Zealand's official representative. The Hillary Commission confirmed it. On paper, I was going to Athens.</p>\n<p>Then the federation tried to sneak Logan Campbell in alongside me. Different division. Different weight class. There was no selection conflict. They just wanted me gone.</p>\n<p>What followed was a battle I shouldn't have had to fight. Official documentation. The Hillary Commission ruling in my favour. The WT forced to select me.</p>\n<p>And then the federation pulled me out anyway.</p>\n<p>I didn't go to Athens.</p>\n\n<div class=\"section-break\">\u2014 \u2014 \u2014</div>\n\n<p>Logan went on to compete at Beijing and London. Two Olympics. He's well known in New Zealand \u2014 famous not just for the sport but for opening a brothel to fund his campaign. I'm not going to pretend that didn't happen or that the contrast wasn't what it was.</p>\n<p>But I want to be clear: I don't hate Logan. He was sympathetic when I didn't make it. Years later, long after the brothel failed and he became a family man, he reached out and encouraged me to go again for 2020. He knew what the system had done. He was caught in it too.</p>\n<p>The injustice wasn't Logan. It was the people who used him and discarded me and called it a selection process.</p>\n\n<div class=\"section-break\">\u2014 \u2014 \u2014</div>\n\n<p>I was 19. I decided that what happened to me was not going to happen to anyone else.</p>\n<p>I campaigned for fair selection across New Zealand taekwondo. Made enough noise for long enough that in 2005 the federation dissolved. A fair selection process was put in place across the board.</p>\n<p>I was 19 when they took Athens from me. I was 21 when the system that took it no longer existed.</p>\n<p>I never got Athens. But every athlete who came after me got a fair shot at theirs.</p>\n\n<div class=\"section-break\">\u2014 \u2014 \u2014</div>\n\n<p>I want to say what was actually running in me then because it matters.</p>\n<p>I wasn't angry. I was purposeful. Anger wants to damage something. Purpose wants to build something that makes the damage mean something.</p>\n<p>At 19 I understood that a moment of injustice only stays injustice if you let it end there. The choice wasn't how do I recover. It was what does this become.</p>\n\n<div class=\"section-break\">\u2014 \u2014 \u2014</div>\n\n<p>Twenty years later I built the Combat Games Series.</p>\n<p>Open entry. Any style. Any level. Any club \u2014 you keep your name, your colours, your identity, your athletes. We provide the platform, the certified officials, the safety standard, the national stage.</p>\n<p>50 clubs. 900 matches. Zero concussions.</p>\n<p>Not because the sport suddenly got safer on its own. Because every single element of the CGS was designed by someone who knew exactly what a broken system does to athletes \u2014 who had lived it at 19 and decided it was the last generation that would.</p>\n<p>No politics. No federation deciding who gets a shot based on who they belong to. No athlete doing everything right and watching the door close anyway because of something that had nothing to do with their performance.</p>\n<p>You enter. You compete. You find out where you stand. You walk away healthy. You come back.</p>\n<p>That's it. That's all it was ever supposed to be.</p>\n\n<div class=\"section-break\">\u2014 \u2014 \u2014</div>\n\n<p>I've been carrying this sport my whole adult life. Not because it was given to me to carry. Because I looked at what it was doing to people and decided someone had to build something better.</p>\n<p>The 19 year old who dissolved a corrupt federation and the man who built the CGS are the same person. Same decision. Same reason.</p>\n<p>The circumstances just kept getting bigger.</p>\n","excerpt":"I was 19 years old at the Athens qualifying tournament in Thailand.\u2026","category":"Story","sector":"all","status":"draft","postNumber":3,"updatedAt":"2026-06-03T02:22:31.957930","created":"2026-06-03T02:22:31.957934"},"post_04_london":{"title":"London","body":"<p>After Port Moresby I went to London.</p>\n<p>Not to recover. Not with a plan. I went because Michael Venom Page trained there and I wanted to know how good I actually was.</p>\n<p>I found out.</p>\n\n<div class=\"section-break\">\u2014 \u2014 \u2014</div>\n\n<p>Page is the greatest striker I have ever seen. I can touch everyone I have ever sparred. I can read people, out-strategise them, find the gap. That's always been my game. Against Page at full contact power there was no game. He gave me black eyes and broken ribs for thirteen months and I kept coming back.</p>\n<p>I trained at London Shootfighters. I'd come home between stretches and train at Auckland MMA and City Kickboxing. The Kiwi gyms train hard but spar light \u2014 no damage, but the work in between is serious. LSF was the opposite. Full contact in sparring at class. Real pressure. Real consequences.</p>\n<p>What I noticed was this: at full contact, I never worked on anything I couldn't already do. The cost of trying something new was getting hurt. So I stuck to what I knew. Which meant I wasn't growing. I was just surviving.</p>\n<p>Back home, the opposite problem. Light sparring meant no real test. Nothing that forced the truth out of you.</p>\n<p>Thirteen months of taking the biggest beatings of my life taught me one thing more than anything else.</p>\n<p>I cared more about the truth than about being right.</p>\n\n<div class=\"section-break\">\u2014 \u2014 \u2014</div>\n\n<p>That sounds simple. It isn't.</p>\n<p>Most people in combat sport are protecting something. Their record. Their reputation. Their position at the top of whatever structure they've built. The full contact sparring environment at LSF wasn't producing better fighters. It was producing fighters who never left their comfort zone because the cost of stepping outside it was immediate and physical.</p>\n<p>Neither extreme was telling the truth.</p>\n<p>I started to see what the truth required. Not full contact that punishes growth. Not light contact that avoids the test. Something precise \u2014 safe enough that you'll actually try something new, real enough that you find out if it works. Light contact isn't the compromise. It's where you progress fastest. No time lost to recovery. No defaulting to what you know because the alternative is getting hurt. Just the work, and the honest feedback of whether it's working.</p>\n<p>That was the seed of CGS. Not a vision. A lesson I learned in my own body over thirteen months of getting taken apart by the best striker in the world.</p>\n\n<div class=\"section-break\">\u2014 \u2014 \u2014</div>\n\n<p>New Zealand has world class combat sports. City Kickboxing and Auckland MMA produce fighters who compete at the highest levels globally. That's real and it's earned.</p>\n<p>But here's what sits underneath that.</p>\n<p>The clubs that develop fighters from nothing \u2014 the small gyms, the regional clubs, the coaches who build athletes from scratch \u2014 they feed the top gyms. They do the development work, build someone from the ground up, and the moment that athlete is good enough to attract attention from the big names, they leave. The small club gets nothing. They start again.</p>\n<p>So the small clubs stay small. Not because they're doing bad work. Because the structure around them extracts their best work and gives nothing back.</p>\n<p>And the athletes who can't or won't make that jump \u2014 who stay loyal to the club that built them, or who live too far away, or who just aren't at that level yet \u2014 they have no pathway. No national stage. No way to find out where they actually stand without travelling internationally, which costs what I spent my whole career trying to find money for.</p>\n<p>I had been everywhere. Taken everything. I knew what the sport needed because I had lived every version of what it lacked.</p>\n\n<div class=\"section-break\">\u2014 \u2014 \u2014</div>\n\n<p>CGS is what happens when you stop extracting and start building.</p>\n<p>Every club keeps its name, its colours, its athletes, its identity. They compete on a national stage representing the gym that built them. The small clubs become viable because they finally have infrastructure that serves them instead of draining them. The athletes who would never have had a pathway get one. Regular events \u2014 consistent enough that you don't lose kids to other sports, visible enough that the work means something.</p>\n<p>50 clubs. 900 matches. Zero concussions.</p>\n<p>Not a programme. Twenty years of hard lessons become infrastructure.</p>\n<p>I just had to be broken down completely before I could see clearly enough to build it.</p>\n","excerpt":"After Port Moresby I went to London.\u2026","category":"Story","sector":"all","status":"draft","postNumber":4,"updatedAt":"2026-06-03T02:22:31.958196","created":"2026-06-03T02:22:31.958199"},"post_05_finding_freedom_and_family":{"title":"Finding Freedom and Family","body":"<p>Finding Freedom and Family</p>\n\n<div class=\"section-break\">\u2014 \u2014 \u2014</div>\n\n<p>I have been carrying things my whole life.</p>\n<p>My family through every move, every new school, every set of streets none of us knew. My siblings so they didn't have to feel the weight of it. Then the sport \u2014 campaigning to dissolve a corrupt federation at 19, competing for twenty years across four disciplines, building the national scene through WAKO NZ as president, running camps and competitions and infrastructure that the sport needed and nobody else was going to build.</p>\n<p>I did most of it for free. I did all of it because someone had to.</p>\n<p>That's a martyr. And I didn't see it clearly until I had no choice but to.</p>\n\n<div class=\"section-break\">\u2014 \u2014 \u2014</div>\n\n<p>After Port Moresby and London I came back to New Zealand with no goals, no pursuit, no destination. For the first time since I was fifteen I wasn't building toward anything or carrying anything for anyone.</p>\n<p>I was just living.</p>\n<p>And it was the best period of my life.</p>\n<p>I was at my physical peak. I threw myself into MMA because I genuinely loved it. New skills. New problems. A different discipline that asked different things. I was learning faster than I ever had because there was no pressure attached. No result that had to justify it. Just the pure pleasure of getting better at something hard.</p>\n<p>I competed at IMMAF Worlds in 2019. World level MMA, just to find out where I stood. Still could. Still wanted to.</p>\n<p>I had put down a weight I had been carrying since I was nine years old. And in the silence of having put it down I found out what I actually was when nothing was riding on it.</p>\n<p>Turns out I just love this. I had always loved it \u2014 but I had spent twenty years running it through the filter of what it needed to prove, or fix, or who it needed to serve. Without that filter, it was just pure.</p>\n\n<div class=\"section-break\">\u2014 \u2014 \u2014</div>\n\n<p>I met Carrie in a Buddhist temple.</p>\n<p>From the first moment I saw her I knew we were going to be together forever. I don't know how to explain that more precisely than that. She made the world make sense suddenly. The kind of clarity you can't manufacture or chase \u2014 it just arrives and you recognise it.</p>\n<p>She has incredibly beautiful blue eyes.</p>\n<p>Our children have them too. David. Chlo\u00eb. The same eyes looking back at me.</p>\n<p>Kyle \u2014 Carrie's son, my stepson \u2014 has my green ones. He's the only one. There's something in that I don't have words for. The one place in this family where I see myself directly reflected back.</p>\n\n<div class=\"section-break\">\u2014 \u2014 \u2014</div>\n\n<p>And I looked at all of them and something became impossible to ignore.</p>\n<p>The loop I had been running my whole life \u2014 carry the weight, sacrifice, give everything, ask for nothing back \u2014 I could see it clearly now in a way I never could before. Not because it was wrong. Because I could see what it had always cost. And I could see that if I kept running it, my children would inherit it.</p>\n<p>A man who martyrs himself teaches his children that love looks like self-erasure. That your purpose is to carry others while you disappear.</p>\n<p>I had to break that loop.</p>\n<p>Not by becoming selfish. By becoming honest. By building something that carried me back \u2014 worthy of what I put into it, that returned something real to my family, built on the love of the thing itself rather than the obligation to fix what was broken.</p>\n\n<div class=\"section-break\">\u2014 \u2014 \u2014</div>\n\n<p>Eagle DS is what I built when I made that decision.</p>\n<p>Not a sacrifice. An investment. In the sport I love. In the community I come from. In the next generation of athletes who deserve what I never had. And in my children who will grow up watching their father build something that lasts \u2014 not because he had to, but because he chose to.</p>\n<p>The free period between Port Moresby and the garage wasn't lost time.</p>\n<p>A rest before building an empire. The first time in my life I picked the weight back up by choice.</p>\n<p>That changes everything about what you build.</p>\n<p>And whether it lasts.</p>\n","excerpt":"Finding Freedom and Family\u2026","category":"Story","sector":"all","status":"draft","postNumber":5,"updatedAt":"2026-06-03T02:22:31.958395","created":"2026-06-03T02:22:31.958398"},"post_06_the_garage":{"title":"The Garage","body":"<p>The Garage</p>\n\n<div class=\"section-break\">\u2014 \u2014 \u2014</div>\n\n<p>After Covid my family found a piece of land in Flatbush. An old farmhouse. A creek running through it. Massive. The kind of place that could sustain itself if the world closed down again \u2014 which in 2022 still felt like a real possibility.</p>\n<p>We rented it. I matted out the garage. Put up wall mats. Filled it with pads.</p>\n<p>That was Eagle DS.</p>\n\n<div class=\"section-break\">\u2014 \u2014 \u2014</div>\n\n<p>The name has three layers and I want to explain them because they matter.</p>\n<p>DS are my initials \u2014 Dafydd Sanders. But the form was inspired by John Danaher. He's a New Zealander living in New York who built one of the greatest grappling teams in the world, the Danaher Death Squad. He's since changed the name. But the structure of it \u2014 initials, identity, a team built around a philosophy \u2014 that was the reference.</p>\n<p>The first name came from somewhere else entirely. When I transitioned from taekwondo to MMA I took a stage name. David Eagle. A new identity for a new discipline. David is my name in English \u2014 Dafydd and David are the same name. Eagle I took from a character in Hajime no Ippo, a boxing manga I had followed for decades. A story about a fighter who starts with nothing and builds himself into something real through pure will and love of the sport.</p>\n<p>That felt right.</p>\n<p>Eagle DS. A new identity. Built from everything that came before it.</p>\n\n<div class=\"section-break\">\u2014 \u2014 \u2014</div>\n\n<p>I was president of WAKO NZ at the time. Running national camps. Building the competition infrastructure for the whole country. I needed students I could send to my own events \u2014 athletes I had developed myself, who understood what I was building and why.</p>\n<p>So I started training people in the garage.</p>\n<p>Not a grand plan. A practical solution to an immediate problem that happened to be the thing I had been moving toward my whole life without knowing it.</p>\n<p>The farmhouse had a creek. It had space. It had the feeling of somewhere that could hold something real. I trained people there for two years \u2014 built the early CGS events, developed the coaching standards, started to build what would eventually become the full ecosystem.</p>\n<p>Then the landlord died. His wife and daughter took over. They had no interest in what was happening on the land. We were told to shut it down.</p>\n\n<div class=\"section-break\">\u2014 \u2014 \u2014</div>\n\n<p>So we found 17 Nandina Avenue, East T\u0101maki. A dedicated facility. October 2025.</p>\n<p>People ask me what it felt like when we had to leave the farmhouse. Whether it was a setback. Whether the two years felt wasted.</p>\n<p>It wasn't a setback. It was a deadline. And I have always built better under pressure than in comfort.</p>\n<p>What the garage gave me wasn't a location. It was the proof that what I was building was real \u2014 that people would show up, that the standard held, that the philosophy worked in practice not just in theory. By the time we were forced out I already knew exactly what I was taking to Nandina.</p>\n<p>I didn't need anyone to tell me it was real.</p>\n<p>I just knew I was real.</p>\n<p>That's always been enough.</p>\n","excerpt":"The Garage\u2026","category":"Story","sector":"all","status":"draft","postNumber":6,"updatedAt":"2026-06-03T02:22:31.958462","created":"2026-06-03T02:22:31.958463"},"post_07_digital_dementia":{"title":"Digital Dementia","body":"<p>Digital Dementia</p>\n\n<div class=\"section-break\">\u2014 \u2014 \u2014</div>\n\n<p>Your kid isn't just distracted.</p>\n<p>That's the conversation nobody is having honestly. We talk about screen time like it's a parenting issue \u2014 a discipline problem, a boundaries problem, something to be managed with rules and timers and phone-free dinners. And while we're having that conversation, the research is saying something considerably more alarming.</p>\n<p>Excessive screen time during brain development produces symptoms identical to early-stage dementia. Impaired concentration. Memory problems. Difficulty with reasoning and inhibitory control. Neuroimaging studies show it physically alters gray matter in key brain regions. Researchers are now linking childhood screen overexposure to increased risk of Alzheimer's and related dementias in adulthood.</p>\n<p>This is not a screen time conversation. This is a brain development conversation. And the window is now \u2014 because the brain being built right now is the one your child will live in for the rest of their life.</p>\n\n<div class=\"section-break\">\u2014 \u2014 \u2014</div>\n\n<p>More than 90% of teenagers globally are on screens for at least two hours a day. Most are well beyond that. The device is not the problem. The device is the delivery mechanism for an environment engineered \u2014 by some of the most sophisticated behavioural scientists in the world, with billions of dollars behind them \u2014 to make putting it down feel like withdrawal and make the real world feel slow and dull by comparison.</p>\n<p>Your child is not weak for struggling with it. They are up against something that adults with fully developed prefrontal cortexes struggle to resist.</p>\n\n<div class=\"section-break\">\u2014 \u2014 \u2014</div>\n\n<p>Here is what it actually looks like in a child's body.</p>\n<p>They don't want to be touched. They flinch from physical contact with other kids. They can't tolerate losing. They check out the moment something gets genuinely hard. They can't tell you what they feel because they've never had to sit with themselves long enough to find out. They are physically present and completely elsewhere.</p>\n<p>This is not attitude. This is not a phase. This is a nervous system that has been trained, through years of overstimulation, to live at a remove from physical reality. From other people. From themselves.</p>\n\n<div class=\"section-break\">\u2014 \u2014 \u2014</div>\n\n<p>Screen limits don't fix this. Taking the phone away doesn't fix this. The capacity that's been left undeveloped doesn't appear when the stimulus disappears. The absence is just louder.</p>\n<p>What fixes it is the opposite of everything the screen is.</p>\n<p>Physical. Demanding. Real. In the presence of other people who are doing the same thing, held to the same standard, measured by the same honest outcomes. An environment where you cannot disappear \u2014 where your body is required, where the person next to you is real, where the result of your effort is immediate and true.</p>\n<p>I have thirty years of experience in combat sport and human performance. I have built a development system from the ground up, run hundreds of young people through it, and I can tell you with complete certainty what happens when you put a child who won't be touched into that environment and hold them to a real standard over time.</p>\n<p>They change.</p>\n<p>Not because we talk about mindfulness. Not because we explain the neuroscience. Because the environment demands presence and presence, repeated enough, becomes who they are.</p>\n\n<div class=\"section-break\">\u2014 \u2014 \u2014</div>\n\n<p>I have watched a child who arrived unable to tolerate physical contact with other kids \u2014 genuinely could not bear to be touched \u2014 do squats with another child on their shoulders in a fireman's carry. Two gold medals at the CGS. Standing in a room full of people who trained with them, beside a coach who held them to something real, having become someone they were not when they walked in the door.</p>\n<p>That is not a screen limit. That is not a programme.</p>\n<p>That is what happens when a human being \u2014 any human being, any age, any background \u2014 is put in a real environment with real people and real outcomes and held there long enough that their nervous system remembers what it is to be fully alive in a body.</p>\n<p>The window is childhood and adolescence. The brain being built now is the one they will live in forever.</p>\n<p>What you do with that is your call.</p>\n<p>But now you know what's actually possible.</p>\n","excerpt":"Digital Dementia\u2026","category":"Mindset","sector":"all","status":"draft","postNumber":7,"updatedAt":"2026-06-03T02:22:31.958668","created":"2026-06-03T02:22:31.958672"},"post_08_identity_is_what_you_intend_to":{"title":"Identity Is What You Intend To Do","body":"<p>Identity Is What You Intend To Do</p>\n\n<div class=\"section-break\">\u2014 \u2014 \u2014</div>\n\n<p>He came from out west. Running from something worse than what he found here.</p>\n<p>Thirteen years old. Already a gang leader. Already carrying weight that most adults never get close to. He found his way to us and he tried \u2014 genuinely tried \u2014 and then he left.</p>\n<p>That's the story. No clean ending. No transformation arc. He came, he tried, he left.</p>\n\n<div class=\"section-break\">\u2014 \u2014 \u2014</div>\n\n<p>What I saw in him while he was here was someone with massive potential. Not theoretical potential \u2014 visible, immediate, unmistakeable.</p>\n<p>I showed it to him.</p>\n<p>He ran.</p>\n<p>Not from the training. From what the training was showing him about himself. Because when you have spent your entire life in circumstances that required you to be something hard and closed and ready for the worst \u2014 hope is not a relief. Hope is a threat. Seeing your own potential when you've built an entire identity around surviving without it is overwhelming in a way that's very hard to stay inside.</p>\n<p>He ran because I showed him too much too fast. That's on me.</p>\n<p>But here's what I kept thinking about after he left.</p>\n<p>He didn't build that ceiling himself. Nobody does.</p>\n\n<div class=\"section-break\">\u2014 \u2014 \u2014</div>\n\n<p>The system builds it for you.</p>\n<p>Not by accident. Not as a side effect of something else. The system needs people to stay where they are \u2014 in their lanes, in their postcodes, in the roles it has designated for them. Compliant. Manageable. Believing that what they have been given is what they deserve and that wanting more than that is either arrogance or delusion.</p>\n<p>The messaging starts early and it is relentless. In classrooms where certain kids get steered toward what's realistic instead of what's possible. In the way certain neighbourhoods get policed and certain ones get resourced. In every small, accumulated signal that tells a person \u2014 this is your ceiling. This is what people like you do. This is as far as you go.</p>\n<p>And the cruellest part of the trick is that by the time it's finished you enforce it yourself. You don't need the system to police you anymore. You've absorbed the ceiling so completely that you call it your own limitation. You look at what you've been given and you call it what you deserve.</p>\n<p>That 13-year-old was running the system's logic perfectly. The largest identity available to him in the world he grew up in was the one he had. In that world it meant power, protection, significance. The system had made sure nothing larger was on offer \u2014 and then it sent police to manage the result.</p>\n\n<div class=\"section-break\">\u2014 \u2014 \u2014</div>\n\n<p>The kid from the private school has had the same trick run on him. Different packaging. A ceiling dressed up as a destiny. A prescribed path so detailed and so complete \u2014 the right school, the right grades, the right university, the right career \u2014 that the question of who he actually is never has to be asked. Compliance is rewarded so consistently and so early that it stops feeling like compliance and starts feeling like identity.</p>\n<p>Both kids are trapped. One looks like failure. One looks like success. The system is satisfied with both of them.</p>\n\n<div class=\"section-break\">\u2014 \u2014 \u2014</div>\n\n<p>The way out is the same for both.</p>\n<p>Your history is the trick. Your identity is what you intend.</p>\n<p>Not what your postcode says. Not what your school record says. Not what anyone who had power over you during your formation decided you were. What you intend. Right now. Today. What you want to build. What you want to become. What you would reach for if the ceiling weren't there.</p>\n<p>That intention \u2014 however small, however new, however uncertain \u2014 is the first thing that has ever been entirely yours. That the system didn't give you and cannot take. That exists independent of everything that happened before it and points only forward.</p>\n<p>The moment a person finds it \u2014 genuinely finds it, not the intention the system put there but the one that came from inside them \u2014 the ceiling starts to crack. Quietly. Irreversibly. And a person who knows the ceiling is a ceiling and not the sky cannot be put back inside the system's logic the same way.</p>\n<p>That is what shatters it. Not protest. Not rebellion. A person who knows who they are.</p>\n\n<div class=\"section-break\">\u2014 \u2014 \u2014</div>\n\n<p>That kid reframed everything about how I approach this work.</p>\n<p>I rebuilt every programme we run for rangatahi around one question: what does this need to feel like for someone who has been so thoroughly convinced of their ceiling that finding their own intention feels like a threat?</p>\n<p>Gentle enough that they find the space. Consistent enough that they come back to it. Patient enough that something real gets built before the demand comes. You don't confront the system's messaging directly \u2014 you build evidence that contradicts it. One session. One outcome. One moment of being held to a standard and meeting it. Until what they know about themselves from their own experience outweighs everything they were told.</p>\n\n<div class=\"section-break\">\u2014 \u2014 \u2014</div>\n\n<p>I have been carrying people since I was old enough to understand they needed it.</p>\n<p>I know what it is to have that ceiling installed. To be told the identity you carry isn't yours to hold. To walk through every institution that was supposed to develop you and find it was designed for someone else.</p>\n<p>I know what it costs to see through it.</p>\n<p>And I know what becomes possible when you do \u2014 not just for the person who sees through it, but for everyone they carry after that.</p>\n<p>That 13-year-old hasn't come back yet.</p>\n<p>Everything here will be exactly the same when he does.</p>\n<p>And when he finds what he intends \u2014 when he separates who he is from everything the system decided he was \u2014 he becomes one more person it cannot count on to stay where it put him.</p>\n<p>That's the point of this work.</p>\n<p>That's always been the point.</p>\n<p>The way out is this.</p>\n<p>Seeing that you are not your history. That you are what you intend. That with purpose \u2014 real purpose, the kind that is yours and not the system's \u2014 you can intend to be anything.</p>\n<p>Not as a slogan. As a life.</p>\n<p>A person who lives with genuine purpose \u2014 who builds for their family, who gives their children the future they intend rather than the one the system allocated, who moves through the world unshackled from the messaging that was designed to contain them \u2014 that person shatters the system by existing. Not by fighting it. By living so completely outside its assumptions that the assumptions stop making sense.</p>\n<p>That is what I am. That is what this place produces.</p>\n<p>One person at a time.</p>\n<p>From the inside out.</p>\n","excerpt":"Identity Is What You Intend To Do\u2026","category":"Mindset","sector":"all","status":"draft","postNumber":8,"updatedAt":"2026-06-03T02:22:31.959043","created":"2026-06-03T02:22:31.959046"},"post_09_managing_outcomes_doesnt_work":{"title":"Managing Outcomes Doesnt Work","body":"<p>Managing Outcomes Doesn't Work</p>\n\n<div class=\"section-break\">\u2014 \u2014 \u2014</div>\n\n<p>I chased Carlo Molfetta across Europe for years.</p>\n<p>He was the level I needed. One of the best in the world at his peak \u2014 fast, intelligent, decorated. Every time I found a tournament he was at, I went. I wanted to see what I actually had against someone who would show me exactly where I stood.</p>\n<p>I never found him in Europe.</p>\n<p>I found him in Australia. Two days after a bad performance at the Oceanias that I hadn't fully processed. The kind of result that gets in your head, that makes you careful \u2014 protecting what's left, making sure the next one doesn't make it worse.</p>\n<p>I put a head kick on him that put me in the lead. The Australian crowd went crazy.</p>\n<p>What I felt in that moment was invincible.</p>\n\n<div class=\"section-break\">\u2014 \u2014 \u2014</div>\n\n<p>Not confident. Not focused. Invincible. The specific feeling of being completely unified \u2014 no gap between who I was and what I was doing, nothing being protected or managed. Just everything I actually was, arriving fully at the exact moment it was needed.</p>\n<p>That only happens when nothing is running between the person and the performance.</p>\n\n<div class=\"section-break\">\u2014 \u2014 \u2014</div>\n\n<p>Here is what destroys it.</p>\n<p>The parent who doesn't want their child training alongside kids who might hold them back. Who ensures their child is always the best in the room. Who doesn't understand that being the best in the room is the problem \u2014 that growth requires resistance, that the kids around your child are the ecosystem that makes your child better. Remove them and you don't protect your child's development. You end it.</p>\n<p>The coach who pads records. Who arranges soft matchups, steers athletes away from the honest test, manufactures a win-loss record that keeps parents happy and destroys up and coming competitors who needed that honest fight to develop. The athlete looks good. The image stays intact. And the foundation underneath it quietly disappears.</p>\n<p>The gym owner who poaches fighters from smaller clubs rather than building the ecosystem around him. Who takes the best athletes from clubs that developed them from nothing and calls it business. What he's actually doing is dismantling the very system that produces the athletes he wants. He kills the growth around him. And then wonders why his own growth stops.</p>\n<p>Killing the growth around you kills your growth. This is true at every level. In every direction.</p>\n\n<div class=\"section-break\">\u2014 \u2014 \u2014</div>\n\n<p>None of these people think they're doing damage. They think they're helping. They're protecting their child, their athlete, their business.</p>\n<p>What they're actually doing is removing the honest environment that makes development possible. And the athlete at the centre of all that protection pays the price \u2014 not immediately, but precisely, at the moment when the real test arrives and the managed environment isn't there anymore.</p>\n<p>Something in them goes looking for the foundation. And finds out how much of it was real.</p>\n<p>That is not a failure of talent. That is the predictable result of an environment that prioritised the image over the truth.</p>\n\n<div class=\"section-break\">\u2014 \u2014 \u2014</div>\n\n<p>What Eagle DS refuses to do is manage outcomes.</p>\n<p>The standard here doesn't move for parents' expectations. It doesn't soften because a result was hard. It doesn't adjust to protect anyone's image of who their child is or what they're capable of. Every athlete in the room is part of the ecosystem that makes every other athlete better. That is non-negotiable.</p>\n<p>That is not harshness. That is the only environment where a person finds out what they're actually made of. Where the gap between who they know they are and who they're actually operating as either closes \u2014 because it turns out they're exactly who they thought \u2014 or becomes visible enough to work on.</p>\n<p>Both are development. Neither is possible in a managed environment.</p>\n\n<div class=\"section-break\">\u2014 \u2014 \u2014</div>\n\n<p>The athletes performing at their absolute peak \u2014 watch them. Really watch them.</p>\n<p>What you're seeing is the image gone. The identity and the performance operating as one unbroken thing. No gap. No managing. Just the full force of a person completely unified with what they're doing.</p>\n<p>That's what's possible when the environment stops protecting the picture and starts demanding the truth.</p>\n<p>Not the result. Not the ranking. Not the carefully managed trajectory.</p>\n<p>Invincible.</p>\n","excerpt":"Managing Outcomes Doesn't Work\u2026","category":"Mindset","sector":"all","status":"draft","postNumber":9,"updatedAt":"2026-06-03T02:22:31.959206","created":"2026-06-03T02:22:31.959209"},"post_10_she_cried_every_session":{"title":"She Cried Every Session","body":"<p>She Cried Every Session</p>\n\n<div class=\"section-break\">\u2014 \u2014 \u2014</div>\n\n<p>I know what you're telling yourself.</p>\n<p>The device is too hard to take away. It's not worth the drama. Your child is different. They'll come around on their own. And if you force it they'll just resent you for it.</p>\n<p>I've heard every version of this from parents who already know the screen is a problem but have tried once, faced the meltdown, and decided it isn't worth the fight.</p>\n<p>I want to tell you what that decision is actually costing your child.</p>\n\n<div class=\"section-break\">\u2014 \u2014 \u2014</div>\n\n<p>Children who spend more than two hours a day on screens are significantly more likely to report anxiety and depression. Motor skills are declining across entire age groups \u2014 children arriving at school unable to perform basic physical coordination that was standard a generation ago. The absence of physical play is linked directly to falling behind on brain development, movement patterns, social skills, and emotional stability.</p>\n<p>This is not a parenting opinion. This is what the research is showing right now, consistently, across every developed country where screens have become the default childhood environment.</p>\n<p>Your child is not different. They are living inside the same conditions as every other child. And the conditions are producing the same results.</p>\n\n<div class=\"section-break\">\u2014 \u2014 \u2014</div>\n\n<p>She was the only girl in a class full of boys.</p>\n<p>She cried. Refused to spar. Refused most drills. Would only train with her brother \u2014 if he wasn't there, she wasn't training. That was the deal she had made with herself and she held it hard.</p>\n<p>Her parents kept bringing her back.</p>\n<p>This is the part most parents don't do. The child resists and the parent reads that as a signal \u2014 this isn't working, this isn't right for her. And they let her go back to the screen or the bedroom or whatever was comfortable and familiar and asked nothing of her.</p>\n<p>Watching your child resist is hard. The path of least resistance is always available and it always feels like kindness.</p>\n<p>What it actually is, is the removal of the one thing that was going to change something.</p>\n<p>Her parents held the line. Week after week through the crying and the refusal and the negotiations about who she would and wouldn't train with. Patient. Consistent. Not harsh. Just present and unwilling to let the resistance be the final answer.</p>\n\n<div class=\"section-break\">\u2014 \u2014 \u2014</div>\n\n<p>I gave her space.</p>\n<p>When she got nervous I let her work with the instructors. Let her find the edges of what she could tolerate until she was ready to move them.</p>\n<p>There is a difference between resistance that needs to be pushed through and resistance that needs to be respected until trust is built. Getting that wrong in either direction costs you the child.</p>\n<p>She came back. She always came back.</p>\n\n<div class=\"section-break\">\u2014 \u2014 \u2014</div>\n\n<p>What happens next is not dramatic. It is gradual and then suddenly obvious.</p>\n<p>The movement that was awkward and disconnected starts to find its shape. A punch lands with the step for the first time \u2014 the body coordinating with itself, not fighting itself. The footwork flows with a partner. Then it becomes automatic. Not thought about. Just done. The body knowing what to do before the mind catches up.</p>\n<p>This is a child finding their body.</p>\n<p>Not fitness. Not sport. The specific experience of being present in a physical self that works \u2014 that responds, that coordinates, that can be trusted. For a child who has spent years on screens, in their head, somewhere else \u2014 this is the first time the body has felt like home.</p>\n<p>Then one day it works in competition.</p>\n<p>A medal. Then more medals. A tracksuit for a national team. Memories that belong entirely to her \u2014 this fight, that opponent, the moment something clicked. Rivals who became reference points. A record built through her own body, her own effort, her own showing up.</p>\n<p>She introduces the nervous new kid now. Leads the warmup in the all-girls class. Goes over to the one who is stuck in their head and not in their body \u2014 because she was that person. She knows exactly what it costs to be there and exactly what it feels like to come through it.</p>\n<p>She lifts them. Not because anyone asked her to. Because that's what happens when a child finds their body and discovers what it's capable of \u2014 they reach back for the ones who are where they were.</p>\n\n<div class=\"section-break\">\u2014 \u2014 \u2014</div>\n\n<p>The drama of taking the device away lasts a week.</p>\n<p>What happens to a child who never finds their body lasts a lifetime.</p>\n<p>Her parents made the harder choice. It was the right one.</p>\n<p>Yours is still available.</p>\n","excerpt":"She Cried Every Session\u2026","category":"Story","sector":"all","status":"draft","postNumber":10,"updatedAt":"2026-06-03T02:22:31.959420","created":"2026-06-03T02:22:31.959423"},"post_11_get_off_your_phone":{"title":"Get Off Your Phone","body":"<p>Get Off Your Phone</p>\n\n<div class=\"section-break\">\u2014 \u2014 \u2014</div>\n\n<p>One in seven teenagers worldwide is currently experiencing a mental health condition. Forty percent of high school students report persistent sadness or hopelessness. The suicide rate for young people has risen 56% in the last decade.</p>\n<p>These are not statistics about weak kids or bad parents. They are the predictable result of a generation that has been handed the most powerful identity-performance machine ever built and told to figure out who they are inside it.</p>\n<p>Social media doesn't just distract teenagers. It gives them a mirror that never stops watching. Every moment of every day the performance is running \u2014 who am I online, how do I come across, what will they think. The image gets constructed, maintained, protected. And the actual person underneath it gets less and less practice at existing without an audience.</p>\n<p>Research confirms what anyone working with teenagers already knows: 60% of teens feel pressured to present an idealised self online. TikTok locks into a user's niche within 40 minutes \u2014 after which 80% of content reinforces that same narrow identity back to them on loop. And the teenage brain is specifically wired for this: the emotional reward system matures earlier than the part of the brain responsible for impulse control and reflection, making teenagers uniquely sensitive to social approval and social rejection at exactly the age when they're supposed to be figuring out who they are.</p>\n<p>The algorithm isn't neutral. It is actively constructing a version of your teenager and feeding it back to them, thousands of times a day, until the constructed version and the real person become harder and harder to tell apart.</p>\n<p>The teenager who has been living inside that mirror for five years doesn't know who they are when the performance drops. Because the performance has never dropped. There has never been a moment real enough, immediate enough, honest enough to show them.</p>\n<p>That is the crisis underneath the crisis. Not anxiety and depression as isolated symptoms. The specific loss of a self that was never given the conditions to form.</p>\n\n<div class=\"section-break\">\u2014 \u2014 \u2014</div>\n\n<p>I pull kids off their phones the moment they walk in.</p>\n<p>Physically. Out of the seat. Into the room. I give them speeches \u2014 long ones, dramatic ones, clearly designed to be laughed at. And they do laugh. Together. And then the in-jokes start \u2014 the specific language that builds inside a group of teenagers who spend enough time together that they develop their own references, their own running gags, their own shorthand for things that happened in training that only they understand.</p>\n<p>I pretend not to know that's happening. I know exactly that it's happening.</p>\n<p>That's the best part of being a teenager in a combat sport. Not the technique. Not the competition. The bonds. The rivalry with the kid from the other club you've fought three times and know better than most of your friends. The moment of absolute terror before a bout and the specific memory of what it felt like. The defeat that stung for weeks. The victory that still gets mentioned years later. The jokes that only make sense to the people who were there.</p>\n<p>I have vivid memories of being that teenager. How funny it was. How real it was. How the fear and the passion and the friendships were all tangled together in a way that nothing else produced.</p>\n<p>Kids now have it harder. In my day none of it ended up on social media. You could have a bad bout and it was between you and the people in the room. Now every moment of vulnerability is potentially permanent and public. Getting a teenager to compete \u2014 to step into a genuinely honest test where the outcome is real and the audience is watching \u2014 is harder than it has ever been. Because the teenage brain is wired to fear social rejection, the performance never stops, and the cost of being seen to lose feels enormous.</p>\n\n<div class=\"section-break\">\u2014 \u2014 \u2014</div>\n\n<p>I had a kid come through from a taekwondo background who had stopped competing.</p>\n<p>He'd been mismatched young \u2014 put against more experienced fighters before he was ready, demoralised by a system that wasn't designed to develop him. He'd withdrawn from competition entirely. The image of himself as someone who loses was too much to carry alongside everything else that had to stay intact.</p>\n<p>I put him in a boxing match against a boxing gym.</p>\n<p>His taekwondo black belt would mean nothing in that fight. Different rules, different range, different everything. I told him: I don't care if you win. Just get your feet wet. Try a new style and learn what it feels like.</p>\n<p>He won.</p>\n<p>Something in him broke free. Not because he won \u2014 because he showed up for a test that had no guarantee attached to it, in a discipline where his existing reputation meant nothing, and found out that what was actually there was enough.</p>\n<p>He came to the CGS after that. Had a breakthrough. A different person on the other side of it.</p>\n\n<div class=\"section-break\">\u2014 \u2014 \u2014</div>\n\n<p>I knew exactly what to do with him because I was him.</p>\n<p>I am every teenager in my classes. The one performing for the room. The one hiding behind the phone. The one who got hurt by a system that wasn't designed to protect them and stopped putting themselves forward. The one who doesn't know yet what's actually there because nothing has ever been real enough to show them.</p>\n<p>I know what it costs to find out. And I know what becomes possible when you do.</p>\n<p>That is what I bring into the room with teenagers. Not a programme. Not a methodology.</p>\n<p>Thirty years of being exactly where they are \u2014 and knowing what's on the other side of it.</p>\n","excerpt":"Get Off Your Phone\u2026","category":"Mindset","sector":"all","status":"draft","postNumber":11,"updatedAt":"2026-06-03T02:22:31.959660","created":"2026-06-03T02:22:31.959663"},"post_12_youd_handle_it":{"title":"You'd Handle It","body":"<p>You'd Handle It</p>\n\n<div class=\"section-break\">\u2014 \u2014 \u2014</div>\n\n<p>There's a question most adults carry around without ever saying out loud.</p>\n<p>If something real happened right now \u2014 a genuine threat, a moment of physical danger, a situation where your body had to respond and not just your mind \u2014 would you be okay?</p>\n<p>Not in a dramatic sense. In the specific, honest sense of: do I have anything in me that would actually hold under real pressure? Or have I been living so far inside the managed, comfortable version of my life that I genuinely don't know anymore?</p>\n<p>Most adults don't know. And the not knowing sits somewhere in the background of every day, quiet but present.</p>\n\n<div class=\"section-break\">\u2014 \u2014 \u2014</div>\n\n<p>In 2011 I was working as an exercise therapist in a physiotherapy clinic. I worked with bodies that office life had worn down \u2014 back pain, neck pain, shoulders that had tightened around a decade of desk posture. Adults in their forties and fifties who had been physically capable in their twenties and had quietly, gradually, without any single decision, stopped being.</p>\n<p>One of the people who came through the door was a man in his late eighties.</p>\n<p>He wasn't there because his doctor sent him. He was there because he had decided he was going to keep walking. That he was not going to become immobile. That he was just going to keep living.</p>\n<p>I went back to that clinic in 2022. He was still there. Stronger than when I'd last seen him. I had assumed he'd be dead by now.</p>\n<p>He wasn't. He was there. Stronger.</p>\n\n<div class=\"section-break\">\u2014 \u2014 \u2014</div>\n\n<p>After 30 you lose 3 to 5 percent of your muscle mass per decade. Sedentary adults lose up to 30 percent by 75. A 2025 systematic review confirmed significant deterioration in neck and shoulder function in office workers \u2014 damage that compounds with every year of inactivity.</p>\n<p>The decline is real.</p>\n<p>What that man showed me is that the decline is a choice, not a sentence.</p>\n<p>The body responds to demand. An eighty-something year old body given something real to do and a person behind it who has decided they are going to keep living gets stronger. Not in spite of the age. Because of the decision.</p>\n\n<div class=\"section-break\">\u2014 \u2014 \u2014</div>\n\n<p>Here is what I know from thirty years across sport science, personal training, exercise therapy and martial arts.</p>\n<p>The human body was built for the full range of human movement \u2014 striking, grappling, rotation, impact, constant adaptation to something unpredictable. When you replace that with a desk and a screen and the same limited movements repeated thousands of times the body doesn't just weaken. It forgets. The range disappears. The joints tighten. The pain arrives \u2014 not as aging, but as the body signalling that it is being asked to sustain something it was never designed for.</p>\n<p>Most adults treat that pain as aging. It isn't. It's what not using your body feels like.</p>\n<p>Combat sport produces the most complete physical adaptation available. Not because it's the hardest \u2014 because it's the most variable. Research confirms that the high-intensity, intermittent, unpredictable nature of combat training produces benefits no single-plane exercise can match. Strength. Neuromuscular control. Aerobic capacity. The specific capacities that sedentary life destroys, rebuilt through movement that demands everything the body has.</p>\n<p>Yes it hurts at first. That is the body waking up.</p>\n<p>And then it adapts. Because that is what a human body does when you ask something real of it.</p>\n\n<div class=\"section-break\">\u2014 \u2014 \u2014</div>\n\n<p>But here is what the research doesn't capture and what I want to say directly to any adult reading this.</p>\n<p>You will walk away from this with something you didn't have before.</p>\n<p>Not just a fitter body. Not just less back pain. A specific, physical, lived confidence that comes from having been in situations that required something real from you and finding out you had it. From having trained alongside people who pushed you. From having found out \u2014 not through being told but through the doing \u2014 that your body is capable of more than you thought and that under real pressure you would handle it better than you currently believe.</p>\n<p>That confidence doesn't stay in the training. It travels. Into every room you walk into. Into how you carry yourself. Into the quiet background question that most adults carry around \u2014 and that you will no longer have to wonder about.</p>\n<p>You'd handle it.</p>\n<p>Come find out.</p>\n","excerpt":"You'd Handle It\u2026","category":"Mindset","sector":"all","status":"draft","postNumber":12,"updatedAt":"2026-06-03T02:22:31.959730","created":"2026-06-03T02:22:31.959731"}}

let token = null;

function log(msg, type) {
  const el = document.getElementById('console');
  const d = document.createElement('div');
  d.className = 'log ' + (type||'info');
  d.textContent = msg;
  el.appendChild(d);
  el.scrollTop = el.scrollHeight;
}

async function login() {
  const email = document.getElementById('auth-email').value.trim();
  const pass  = document.getElementById('auth-pass').value;
  const err   = document.getElementById('err');
  if (!email || !pass) { err.textContent = 'Email and password required.'; return; }
  try {
    if (!firebase.apps.length) firebase.initializeApp(FB_CONFIG);
    const cred = await firebase.auth().signInWithEmailAndPassword(email, pass);
    token = await cred.user.getIdToken();
    err.textContent = '';
    document.getElementById('gate').style.display = 'none';
    document.getElementById('console').style.display = 'block';
    await seedPosts();
  } catch(e) {
    err.textContent = 'Login failed — check your details.';
  }
}

async function seedPosts() {
  log('Authenticated. Loading existing posts…', 'gold');
  
  // Load existing posts
  let existing = {};
  try {
    const r = await fetch(FB + '/eagle_blog.json?auth=' + token);
    existing = await r.json() || {};
    log('Existing posts: ' + Object.keys(existing).length, 'info');
  } catch(e) {
    log('No existing posts found — seeding fresh.', 'info');
  }
  
  // Merge — don't overwrite existing posts
  const merged = Object.assign({}, existing);
  let added = 0, skipped = 0;
  
  for (const [key, post] of Object.entries(POSTS)) {
    if (merged[key]) {
      log('Skip (exists): ' + post.title, 'info');
      skipped++;
    } else {
      merged[key] = post;
      log('Added: Post ' + post.postNumber + ' — ' + post.title, 'ok');
      added++;
    }
  }
  
  log('Writing to Firebase…', 'gold');
  try {
    const r = await fetch(FB + '/eagle_blog.json?auth=' + token, {
      method: 'PUT',
      body: JSON.stringify(merged)
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    log('Done. ' + added + ' posts seeded, ' + skipped + ' skipped. Total: ' + Object.keys(merged).length + ' posts.', 'ok');
    document.getElementById('done').classList.add('show');
    document.getElementById('go-blog').style.display = 'block';
  } catch(e) {
    log('Firebase write failed: ' + e.message, 'err-line');
  }
}
</script>
